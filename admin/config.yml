backend:
  name: github
  repo: bgisocpp/bgisocpp.github.io
  branch: master
  base_url: https://effortless-naiad-292791.netlify.app

# Uncomment the line below for local development with `npx decap-server`
# local_backend: true

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "meetings"
    label: "Meetings"
    folder: "_meetings"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date & Time", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: "HH:mm" }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Location link", name: "location_link", widget: "string", required: false, hint: "Google Maps URL" }
      - { label: "Agenda", name: "agenda", widget: "markdown" }
      - { label: "Speakers", name: "speakers", widget: "markdown", required: false, hint: "Names and short bios of the speakers" }
      - label: "Slides"
        name: "slides"
        widget: "list"
        required: false
        hint: "Upload one or more slide decks"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "File", name: "file", widget: "file" }
      - { label: "Materials", name: "materials", widget: "markdown", required: false, hint: "Code examples, links to repos, and other resources" }

  - name: "pages"
    label: "Pages"
    files:
      - label: "About"
        name: "about"
        file: "about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/about/" }
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Body", name: "body", widget: "markdown" }


